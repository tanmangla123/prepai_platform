<!DOCTYPE html>
<html>
<head>
    <title>Viva Practice</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="navbar">
    <h2>{{ viva_type|upper }} VIVA</h2>
    <a href="/dashboard">Dashboard</a>
</div>

<div class="questions-container">

    <div class="question-card">

        <h4 id="progress"></h4>
        <h2 id="question"></h2>

       <div class="btn-group">
    <button onclick="startRecording()" class="btn" id="startBtn">🎤 Start</button>
    <button onclick="stopRecording()" class="btn" id="stopBtn" disabled>⏹ Stop</button>
    <button onclick="submitAnswer()" class="btn">✅ Submit</button>
    <button onclick="nextQuestion()" class="btn">➡ Next</button>
</div>

        <h4>Your Answer:</h4>
        <div class="answer-box">
            <p id="output">Start speaking...</p>
        </div>
        <h4>AI Feedback:</h4>

<div class="feedback-box">
    <div id="score" class="score"></div>

    <div class="feedback-section good">
        <h4>✅ Strengths</h4>
        <p id="strengths"></p>
    </div>

    <div class="feedback-section bad">
        <h4>❌ Weaknesses</h4>
        <p id="weaknesses"></p>
    </div>

    <div class="feedback-section improve">
        <h4>💡 Improvement</h4>
        <p id="improvement"></p>
    </div>
</div>

    </div>

</div>

<!-- Store questions safely -->
<script>
let questions = {{ questions | tojson | safe }};
console.log("Questions:", questions);

let index = 0;
let finalText = "";

// Speech Recognition
let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.continuous = true;

// SHOW FIRST QUESTION
window.onload = function() {
    showQuestion();
};

function showQuestion() {
    let q = questions[index];
    let questionText = q[2] || q[1] || q[0];

    document.getElementById("question").innerText = questionText;
    document.getElementById("progress").innerText =
        "Question " + (index + 1) + " / " + questions.length;
}

function startRecording() {
    recognition.start();
    finalText = "";

    document.getElementById("output").innerText = "Listening...";
    document.getElementById("startBtn").disabled = true;
    document.getElementById("stopBtn").disabled = false;
}

function stopRecording() {
    recognition.stop();

    document.getElementById("startBtn").disabled = false;
    document.getElementById("stopBtn").disabled = true;
}

recognition.onresult = function(event) {
    let interim = "";
    for (let i = event.resultIndex; i < event.results.length; i++) {
        let transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
            finalText += transcript + " ";
        } else {
            interim += transcript;
        }
    }
    document.getElementById("output").innerText = finalText + interim;
};

function nextQuestion() {

    document.getElementById("score").innerText = "";
    document.getElementById("strengths").innerText = "";
    document.getElementById("weaknesses").innerText = "";
    document.getElementById("improvement").innerText = "";

    index++;
    finalText = "";

    if (index < questions.length) {
        showQuestion();
        document.getElementById("output").innerText = "Start speaking...";
    } else {
        alert("🎉 Viva Completed!");
    }
}

function submitAnswer() {

    let question = questions[index][2] || questions[index][1];
    let answer = finalText;

    if (answer.trim() === "") {
        alert("Please record or speak your answer first!");
        return;
    }

    document.getElementById("score").innerText = "⏳ Evaluating...";

    fetch('/submit_answer', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: `question=${encodeURIComponent(question)}&answer=${encodeURIComponent(answer)}`
    })
    .then(response => response.json())
    .then(data => {
        let feedback = data.feedback;

        let score = "";
        let strengths = "";
        let weaknesses = "";
        let improvement = "";

        let scoreMatch = feedback.match(/Score:\s*(.*)/);
        if (scoreMatch) score = scoreMatch[1];

        let strengthsMatch = feedback.match(/Strengths:\s*([\s\S]*?)Weaknesses:/);
        if (strengthsMatch) strengths = strengthsMatch[1];

        let weakMatch = feedback.match(/Weaknesses:\s*([\s\S]*?)How to Improve:/);
        if (weakMatch) weaknesses = weakMatch[1];

        let improveMatch = feedback.match(/How to Improve:\s*([\s\S]*)/);
        if (improveMatch) improvement = improveMatch[1];

        document.getElementById("score").innerText = "⭐ Score: " + score.trim();
        document.getElementById("strengths").innerText = strengths.trim();
        document.getElementById("weaknesses").innerText = weaknesses.trim();
        document.getElementById("improvement").innerText = improvement.trim();
    })
    .catch(error => {
        console.error(error);
        alert("❌ Error submitting answer");
    });
}
</script>

</body>
</html>
